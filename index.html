<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Tool</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #18201d;
            --muted: #65706b;
            --paper: #fffdf8;
            --surface: rgba(255, 253, 248, 0.92);
            --line: #ded7c9;
            --teal: #0f766e;
            --teal-dark: #115e59;
            --coral: #d95f43;
            --gold: #c08a22;
            --violet: #6d5bd0;
            --shadow: 0 24px 70px rgba(34, 43, 40, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                linear-gradient(115deg, rgba(15, 118, 110, 0.16), transparent 36%),
                linear-gradient(245deg, rgba(217, 95, 67, 0.16), transparent 34%),
                linear-gradient(180deg, #f7f1e6 0%, #e7efe9 50%, #fbf6ed 100%);
        }

        body::before {
            position: fixed;
            inset: 0;
            z-index: -1;
            content: "";
            background-image:
                linear-gradient(rgba(24, 32, 29, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(24, 32, 29, 0.035) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.15));
        }

        button,
        textarea,
        select {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        .page {
            width: min(1120px, calc(100% - 32px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 32px 0;
            display: grid;
            align-content: center;
            gap: 22px;
        }

        .masthead {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
        }

        .brand-mark {
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(24, 32, 29, 0.12);
            border-radius: 8px;
            color: var(--paper);
            font-size: 1.55rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--teal), var(--coral));
            box-shadow: 0 18px 40px rgba(15, 118, 110, 0.22);
        }

        h1,
        p {
            margin: 0;
        }

        h1 {
            margin-top: 12px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2.35rem, 7vw, 5.4rem);
            line-height: 0.9;
            letter-spacing: 0;
        }

        .subtitle {
            max-width: 610px;
            margin-top: 12px;
            color: #41504a;
            font-size: clamp(1rem, 2vw, 1.14rem);
            line-height: 1.6;
        }

        .language-ribbon {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            max-width: 380px;
        }

        .language-ribbon span {
            min-width: 72px;
            padding: 8px 10px;
            border: 1px solid rgba(24, 32, 29, 0.12);
            border-radius: 999px;
            color: #31423b;
            text-align: center;
            background: rgba(255, 253, 248, 0.7);
            backdrop-filter: blur(8px);
        }

        .tool {
            overflow: hidden;
            border: 1px solid rgba(24, 32, 29, 0.14);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto auto;
            gap: 12px;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.72);
        }

        .field {
            display: grid;
            gap: 7px;
        }

        label,
        .meta {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            min-height: 44px;
            padding: 0 42px 0 13px;
            border: 1px solid #cfc7b8;
            border-radius: 8px;
            color: var(--ink);
            background:
                linear-gradient(45deg, transparent 50%, var(--teal) 50%),
                linear-gradient(135deg, var(--teal) 50%, transparent 50%),
                linear-gradient(to right, transparent, transparent);
            background-color: #fffaf1;
            background-position:
                calc(100% - 20px) 19px,
                calc(100% - 14px) 19px,
                100% 0;
            background-repeat: no-repeat;
            background-size: 6px 6px, 6px 6px, 2.5em 2.5em;
            appearance: none;
        }

        select:focus,
        textarea:focus {
            border-color: var(--teal);
            outline: 3px solid rgba(15, 118, 110, 0.18);
        }

        .icon-button {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border: 1px solid #cfc7b8;
            border-radius: 8px;
            color: var(--teal-dark);
            font-size: 1.15rem;
            background: #fffaf1;
        }

        .icon-button:hover {
            border-color: var(--teal);
            background: #f2fbf7;
        }

        .translate-button {
            min-height: 44px;
            padding: 0 18px;
            border-radius: 8px;
            color: #fffdf8;
            font-weight: 800;
            background: var(--teal-dark);
            box-shadow: 0 12px 28px rgba(17, 94, 89, 0.26);
        }

        .translate-button:hover {
            background: #0d4f4b;
        }

        .translate-button:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .panes {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            min-height: 360px;
        }

        .pane {
            display: grid;
            grid-template-rows: auto minmax(260px, 1fr) auto;
            min-width: 0;
        }

        .pane + .pane {
            border-left: 1px solid var(--line);
        }

        .pane-header,
        .pane-footer {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 253, 248, 0.56);
        }

        .pane-header {
            border-bottom: 1px solid rgba(222, 215, 201, 0.7);
        }

        .pane-footer {
            border-top: 1px solid rgba(222, 215, 201, 0.7);
        }

        textarea,
        .output {
            width: 100%;
            min-width: 0;
            border: 0;
            color: var(--ink);
            font-size: clamp(1.02rem, 2vw, 1.18rem);
            line-height: 1.7;
            background: transparent;
        }

        textarea {
            min-height: 260px;
            padding: 22px 20px;
            resize: none;
        }

        textarea::placeholder,
        .empty {
            color: #8b958f;
        }

        .output {
            min-height: 260px;
            padding: 22px 20px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .output[data-state="error"] {
            color: #a23f2b;
        }

        .output[data-state="loading"] {
            color: var(--teal-dark);
        }

        .small-button {
            min-height: 34px;
            padding: 0 12px;
            border: 1px solid #cfc7b8;
            border-radius: 8px;
            color: #33443e;
            font-size: 0.88rem;
            font-weight: 750;
            background: #fffaf1;
        }

        .small-button:hover {
            border-color: var(--coral);
            color: #7d3325;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4d5b55;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--gold);
        }

        .accent-strip {
            height: 6px;
            background: linear-gradient(90deg, var(--teal) 0 28%, var(--gold) 28% 45%, var(--coral) 45% 72%, var(--violet) 72% 100%);
        }

        @media (max-width: 820px) {
            .page {
                width: min(100% - 24px, 620px);
                padding: 22px 0;
            }

            .masthead {
                display: grid;
            }

            .language-ribbon {
                justify-content: flex-start;
                max-width: none;
            }

            .toolbar {
                grid-template-columns: 1fr auto;
            }

            .field {
                grid-column: span 2;
            }

            .translate-button {
                grid-column: span 2;
            }

            .panes {
                grid-template-columns: 1fr;
            }

            .pane + .pane {
                border-left: 0;
                border-top: 1px solid var(--line);
            }

            textarea,
            .output {
                min-height: 220px;
            }
        }

        @media (max-width: 480px) {
            .page {
                width: calc(100% - 18px);
                padding: 12px 0;
            }

            .brand-mark {
                width: 48px;
                height: 48px;
            }

            .toolbar,
            .pane-header,
            .pane-footer {
                padding: 12px;
            }

            .language-ribbon span {
                min-width: auto;
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="masthead">
            <div>
                <div class="brand-mark" aria-hidden="true">T</div>
                <h1>Translation Tool</h1>
                <p class="subtitle">A quiet place to move a thought from one language into another.</p>
            </div>
            <div class="language-ribbon" aria-label="Supported languages">
                <span>Hello</span>
                <span>Bonjour</span>
                <span>Hola</span>
                <span>Selam</span>
                <span>ሰላም</span>
            </div>
        </header>

        <section class="tool" aria-label="Translator">
            <div class="accent-strip" aria-hidden="true"></div>
            <div class="toolbar">
                <div class="field">
                    <label for="source">From</label>
                    <select id="source">
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="am">Amharic</option>
                        <option value="ti">Tigrinya</option>
                        <option value="es">Spanish</option>
                    </select>
                </div>

                <button class="icon-button" id="swap" type="button" title="Swap languages" aria-label="Swap languages">⇄</button>

                <div class="field">
                    <label for="target">To</label>
                    <select id="target">
                        <option value="fr">French</option>
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="am">Amharic</option>
                        <option value="ti">Tigrinya</option>
                    </select>
                </div>

                <button class="small-button" id="clear" type="button">Clear</button>
                <button class="translate-button" id="translate" type="button">Translate</button>
            </div>

            <div class="panes">
                <section class="pane" aria-label="Source text">
                    <div class="pane-header">
                        <span class="meta">Original</span>
                        <span class="status"><span class="status-dot" aria-hidden="true"></span><span id="status">Ready</span></span>
                    </div>
                    <textarea name="textarea" id="input" placeholder="Type or paste text here..." rows="8"></textarea>
                    <div class="pane-footer">
                        <span class="meta" id="charCount">0 characters</span>
                    </div>
                </section>

                <section class="pane" aria-label="Translated text">
                    <div class="pane-header">
                        <span class="meta">Translation</span>
                        <button class="small-button" id="copy" type="button">Copy</button>
                    </div>
                    <div class="output empty" id="output">Your translation will appear here.</div>
                    <div class="pane-footer">
                        <span class="meta" id="languagePair">English to French</span>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
